<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Topos Chess - Strategy with Terrain</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="controls-header">
        <div class="header-left">
            <h1>Topos Chess</h1>
            <button id="btn-zen" class="btn-ghost" title="Toggle Zen Mode">👁️ Zen</button>
            <button id="btn-reset" class="btn-ghost" title="Reset Match">🔄 Reset</button>
            <button id="btn-flip" class="btn-ghost" title="Flip Board Perspective">🔁 Flip</button>
        </div>
        <div class="header-right">
            <button id="btn-undo" class="btn-ghost" disabled title="Undo Move">⬅️ Undo</button>
            <button id="btn-redo" class="btn-ghost" disabled title="Redo Move">➡️ Redo</button>
        </div>
    </header>

    <main class="game-layout">
        <div class="board-container-wrapper">
            <div class="left-control-stack">
                <div id="node-b" class="turn-indicator-node black-node" title="Black's Turn Indicator"></div>
                <input type="range" id="zoom-slider" class="vertical-slider" min="1" max="3" step="1" value="1" title="Zoom Preset: 1=14x14, 2=8x8, 3=4x4">
                <div id="node-w" class="turn-indicator-node white-node active-glow" title="White's Turn Indicator"></div>
            </div>

            <div class="board-outer" id="board-outer">
                <div class="labels ranks-labels" id="ranks-labels"></div>
                <div class="labels files-labels" id="files-labels"></div>
                <div class="board" id="board"></div>
                <div id="mini-map" class="mini-map">
                    <div id="mini-viewport" class="mini-map-viewport"></div>
                </div>
                <div id="win-overlay" class="win-overlay hidden">
                    <div class="win-modal">
                        <h2 id="win-title">White Wins!</h2>
                        <button id="btn-another-match" class="btn-primary">Play Again</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-panels">
            <section class="panel-card">
                <h3>Match Configuration</h3>
                <div class="control-group">
                    <label for="terrain-select">Map Terrain:</label>
                    <select id="terrain-select" class="select-clean">
                        <option value="default">Default</option>
                        <option value="alternative">Alternative Arrangement</option>
                        <option value="none">None (Classic)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="switch-label">
                        <input type="checkbox" id="ai-toggle" checked> Enable AI Opponent (Black)
                    </label>
                </div>
                <div class="control-group">
                    <label for="ai-depth">AI Search Depth:</label>
                    <select id="ai-depth" class="select-clean">
                        <option value="1">Depth 1 (Fast)</option>
                        <option value="2" selected>Depth 2 (Balanced)</option>
                        <option value="3">Depth 3 (Analytical)</option>
                    </select>
                </div>
                <div id="ai-thinking" class="ai-thinking-indicator hidden">
                    <div class="spinner"></div>
                    <span>AI is calculating strategic pathways...</span>
                </div>
            </section>

            <section class="panel-card">
                <h3>Move History Timeline</h3>
                <div class="log-scroll-frame">
                    <ul id="move-log-list" class="move-log-list"></ul>
                </div>
            </section>

            <section class="panel-card">
                <h3>Terrain Tactical Index</h3>
                <div class="legend-grid">
                    <div class="legend-item"><div class="key-patch plain"></div> <span>Plain</span></div>
                    <div class="legend-item"><div class="key-patch home"></div> <span>Sanctuary</span></div>
                    <div class="legend-item"><div class="key-patch mountain"></div> <span>Mountain</span></div>
                    <div class="legend-item"><div class="key-patch forest"></div> <span>Forest</span></div>
                    <div class="legend-item"><div class="key-patch river"></div> <span>River</span></div>
                    <div class="legend-item"><div class="key-patch lake"></div> <span>Lake</span></div>
                    <div class="legend-item"><div class="key-patch ford"></div> <span>Ford</span></div>
                </div>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
