<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Topos Chess - Strategy with Terrain</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="controls-header">
        <div class="header-left">
            <h1>Topos Chess</h1>
            <button id="btn-zen" class="btn-ghost">👁️ Zen</button>
            <button id="btn-reset" class="btn-ghost">🔄 Reset</button>
            <button id="btn-flip" class="btn-ghost">🔁 Flip</button>
        </div>
    </header>
    <main class="game-layout">
        <div class="board-container-wrapper">
            <div class="left-control-stack">
                <div id="node-b" class="turn-indicator-node" title="Black's Turn"></div>
                <input type="range" id="zoom-slider" class="vertical-slider" min="1" max="3" step="1" value="1">
                <div id="node-w" class="turn-indicator-node active-glow" title="White's Turn"></div>
            </div>
            <div class="board-outer" id="board-outer">
                <div class="board" id="board"></div>

                <div id="win-overlay" class="win-overlay hidden">
                    <div class="win-modal-content">
                        <h2 id="win-title">White Wins!</h2>
                        <button id="btn-another-match" class="btn-primary">Play Again</button>
                    </div>
                </div>
            </div>
        </div>

   

<div class="game-panels">
            <section class="panel-card">
                <h3>Match Configuration</h3>
                <div class="control-group">
                    <label for="terrain-select">Map Terrain:</label>
                    <select id="terrain-select">
                        <option value="default">Default</option>
                        <option value="alternative">Alternative</option>
                        <option value="none">None (Classic)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label><input type="checkbox" id="ai-toggle" checked> Enable AI</label>
                </div>
                <div class="control-group">
                    <label for="ai-depth-select">AI Difficulty:</label>
                    <select id="ai-depth-select">
                        <option value="1">Easy</option>
                        <option value="2" selected>Medium</option>
                        <option value="3">Hard</option>
                        <option value="4">Expert (slower)</option>
                    </select>
                </div>
            </section>

            <section class="panel-card">
                <h3>Move History</h3>
                <div class="control-group" style="margin-bottom: 15px;">
                    <button id="btn-undo" class="btn-ghost" disabled>↩️ Undo</button>
                    <button id="btn-redo" class="btn-ghost" disabled>↪️ Redo</button>
                </div>
                <ul id="move-log-list" style="list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; font-family: monospace; color: #ccc; line-height: 1.6;"></ul>
            </section>
        </div>
    </main>
    
    <script src="ai.js"></script>
    <script src="app.js"></script>
</body>
</html>
